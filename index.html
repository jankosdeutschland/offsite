<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wartungsarbeiten | JANKOS</title>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f0f4ff 0%, #d9e2ff 100%);
        }

        .card { 
            background: white; 
            padding: 50px 40px; 
            border-radius: 28px; 
            box-shadow: 0 15px 35px rgba(0, 0, 80, 0.1);
            max-width: 450px;
            width: 85%;
            text-align: center;
            border-top: 8px solid #0012ff;
        }

        .logo {
            max-width: 250px;
            height: auto;
            margin-bottom: 30px;
        }

        h1 { 
            color: #000880;
            margin-bottom: 16px;
            font-size: 26px;
            font-weight: 700;
        }

        p { 
            color: #4b5563; 
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 17px;
        }

        .status {
            display: inline-block;
            padding: 10px 20px;
            background-color: #1d7e1d;
            color: white;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://raw.githubusercontent.com/jankosdeutschland/offsite/main/Jankos%20Logo%20(1).png" alt="JANKOS Logo" class="logo">
        
        <h1>Gleich wieder da!</h1>
        <p>Wir optimieren gerade unsere Website für dich. JANKOS ist in Kürze wieder mit vollem Service erreichbar.</p>
        
        <div class="status">System-Update aktiv</div>
    </div>

</body>
</html>
